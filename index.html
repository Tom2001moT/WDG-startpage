<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDG-startpage</title>
    <!-- Importing Sci-Fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030305;
            --surface: rgba(10, 10, 15, 0.6);
            --surface-hover: rgba(20, 20, 30, 0.8);
            --border: rgba(0, 229, 255, 0.15);
            --border-glow: rgba(0, 229, 255, 0.5);
            --text-main: #e0f8ff;
            --text-dim: #7090a0;
            --cyan: #00e5ff;
            --purple: #b400ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 0 120px 0; /* Padding allows scrolling past the bottom status bar */
            position: relative;
        }

        /* Animated Background Orbs */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--cyan);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--purple);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 60px) scale(0.9); }
        }

        /* Subtle Grid Overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            margin: auto 0; /* Automatically centers the container when there is enough vertical space */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px 20px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
            animation: bootUp 1s ease-out forwards;
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header / Clock */
        header {
            text-align: center;
        }

        .time {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(180deg, #ffffff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            line-height: 1;
            margin-bottom: 10px;
            cursor: pointer;
            transition: text-shadow 0.3s ease;
        }

        .time:hover {
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
        }

        .date-sys {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 6px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .date-sys::before, .date-sys::after {
            content: '';
            height: 1px;
            width: 30px;
            background: var(--cyan);
            opacity: 0.5;
        }

        /* --- Time Format Toggle --- */
        .format-toggle {
            cursor: pointer;
            color: var(--purple);
            margin-left: 12px;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .format-toggle:hover {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        /* Search Module */
        .search-module {
            width: 100%;
            max-width: 600px;
        }

        .search-form {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 24px 18px 50px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .search-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.1);
            background: rgba(0, 229, 255, 0.05);
        }

        .search-input::placeholder {
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            color: var(--cyan);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        /* Quick Links Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
        }

        .link-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .link-card:hover {
            transform: translateY(-5px);
            background: var(--surface-hover);
            border-color: var(--cyan);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .link-card:hover::before {
            left: 200%;
        }

        .link-icon {
            width: 32px;
            height: 32px;
            fill: currentColor;
            color: var(--text-dim);
            transition: color 0.3s ease;
        }

        .link-card:hover .link-icon {
            color: var(--cyan);
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        .link-name {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Status Bar (Bottom) */
        .status-bar {
            position: fixed;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; box-shadow: 0 0 4px var(--cyan); }
            50% { opacity: 1; box-shadow: 0 0 12px var(--cyan); }
            100% { opacity: 0.5; box-shadow: 0 0 4px var(--cyan); }
        }

        /* --- Network Stats Styles --- */
        .net-stats {
            display: flex;
            gap: 15px;
            align-items: center;
            font-variant-numeric: tabular-nums;
        }

        .net-stats > span {
            white-space: nowrap;
        }

        .highlight-net {
            color: #00ff66;
            font-weight: 700;
            display: inline-block;
            min-width: 45px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* --- Graph Styles --- */
        .graph-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #sysGraph {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .graph-legend {
            display: flex;
            flex-direction: column;
            font-size: 0.6rem;
            line-height: 1.2;
            font-weight: 700;
        }

        /* --- Developer Footer --- */
        .developer-footer {
            position: fixed;
            bottom: 10px;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        .developer-footer a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .developer-footer a:hover {
            color: var(--purple);
            text-shadow: 0 0 10px var(--purple);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 30px 15px;
                gap: 30px;
                width: 92%;
            }
            .time {
                font-size: 3rem;
            }
            .date-sys {
                font-size: 1rem;
            }
            .links-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .status-bar {
                bottom: 35px;
                gap: 10px;
                padding: 0 10px;
            }
            .status-item {
                margin-left: 0 !important;
            }
            .status-item span {
                font-size: 0.7rem;
            }
            .net-stats {
                gap: 8px;
                justify-content: center;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 400px) {
            .time {
                font-size: 2.2rem;
            }
            .link-card {
                padding: 15px;
            }
            .link-icon {
                width: 24px;
                height: 24px;
            }
            .link-name {
                font-size: 0.85rem;
            }
        }

        /* --- AI Integration Styles --- */
        .search-form {
            gap: 12px;
        }

        .ai-btn {
            background: rgba(180, 0, 255, 0.15);
            border: 1px solid var(--purple);
            color: var(--text-main);
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .ai-btn:hover {
            background: var(--purple);
            box-shadow: 0 0 15px rgba(180, 0, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .ai-terminal {
            margin-top: 20px;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--purple);
            border-radius: 12px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 0 0 20px rgba(180, 0, 255, 0.1);
        }
        
        .ai-terminal.active {
            display: flex;
            animation: bootUp 0.5s ease-out forwards;
        }
        
        .ai-header {
            font-family: 'Orbitron', sans-serif;
            color: var(--purple);
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(180, 0, 255, 0.3);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .ai-content {
            font-family: monospace;
            font-size: 1rem;
            color: var(--text-main);
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--purple);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

    <!-- Bottom Status Info -->
    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot"></div>
            <span>NETWORK: SECURE</span>
        </div>
        <div class="status-item">
            <div class="status-dot" style="background: var(--purple); box-shadow: 0 0 8px var(--purple);"></div>
            <span>LOCATION: INDIA</span>
        </div>
        <div class="status-item">
            <div class="status-dot" style="background: #00ff66; box-shadow: 0 0 8px #00ff66;"></div>
            <div class="net-stats">
                <span>TOT: <span id="netTot" class="highlight-net">--</span> MB/s</span>
                <span>DL: <span id="netDl" class="highlight-net">--</span> MB/s</span>
                <span>UL: <span id="netUl" class="highlight-net">--</span> MB/s</span>
                <span>PING: <span id="netPing" class="highlight-net" style="min-width: 30px;">--</span> ms</span>
                <span>LAT: <span id="netLat" class="highlight-net" style="min-width: 30px;">--</span> ms</span>
            </div>
        </div>
        <div class="status-item graph-container">
            <canvas id="sysGraph" width="80" height="24"></canvas>
            <div class="graph-legend">
                <span style="color: #00ff66;">NET</span>
                <span style="color: var(--purple);">CPU</span>
                <span style="color: var(--cyan);">RAM</span>
            </div>
        </div>
    </div>

    <!-- Developer Footer -->
    <div class="developer-footer">
        DEVELOPER // <a href="https://tom2001mot.github.io/WDG_3D-Portfolio" target="_blank" rel="noopener">WDG</a>
    </div>

    <!-- Core Logic -->
    <script>
        // --- CLOCK & TIME FORMAT LOGIC ---
        let is24Hour = true;
        try {
            // Retrieve user preference if saved
            if (localStorage.getItem('timeFormat') === '12') {
                is24Hour = false;
            }
        } catch(e) {} // Handle strict browser security settings gracefully

        const timeDisplay = document.getElementById('timeDisplay');
        const formatToggle = document.getElementById('formatToggle');
        const dateDisplay = document.getElementById('dateDisplay');

        function toggleTimeFormat() {
            is24Hour = !is24Hour;
            try {
                localStorage.setItem('timeFormat', is24Hour ? '24' : '12');
            } catch(e) {}
            updateSystemClock();
        }

        // Allow toggling via both the clock and the [ 24H ] badge
        timeDisplay.addEventListener('click', toggleTimeFormat);
        formatToggle.addEventListener('click', toggleTimeFormat);

        function updateSystemClock() {
            const now = new Date();
            
            let rawHours = now.getHours();
            let amPm = '';
            
            // Format to 12-hour if requested
            if (!is24Hour) {
                amPm = rawHours >= 12 ? ' PM' : ' AM';
                rawHours = rawHours % 12 || 12; // Converts 0 (midnight) to 12
            }

            let hours = String(rawHours).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Render time with dynamically sized AM/PM text if in 12h mode
            if (!is24Hour) {
                timeDisplay.innerHTML = `${hours}:${minutes}:${seconds}<span style="font-size: 0.35em; color: var(--text-dim); letter-spacing: 2px; margin-left: 8px;">${amPm}</span>`;
            } else {
                timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
            }
            
            // Update the toggle button text to show current state
            formatToggle.textContent = `[ ${is24Hour ? '24H' : '12H'} ]`;

            // Date Formatting
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('en-GB', options).replace(/\//g, '.');
            dateDisplay.innerHTML = `SYS.DATE // ${dateStr}`;
        }

        // Initialize clock and update every second (clear previous intervals for live-reloading environments)
        updateSystemClock();
        if (window.clockInterval) clearInterval(window.clockInterval);
        window.clockInterval = setInterval(updateSystemClock, 1000);

        // --- LIVE DETAILED NETWORK INDICATOR ---
        let baseDl = navigator.connection ? navigator.connection.downlink : 150;
        let baseRtt = navigator.connection ? navigator.connection.rtt : 45;
        
        // Listen for actual network changes
        if (navigator.connection) {
            navigator.connection.addEventListener('change', () => {
                baseDl = navigator.connection.downlink || 150;
                baseRtt = navigator.connection.rtt || 45;
            });
        }

        function updateSpeedDisplay() {
            // Jitter calculations for a "live terminal" visual effect (browsers don't update every ms)
            const jitterDl = baseDl * 0.05;
            const dlSpeed = Math.max(0, baseDl + (Math.random() * jitterDl * 2) - jitterDl);
            
            // Browsers don't report Upload directly, so we simulate it relative to Download (~40%)
            const baseUl = baseDl * 0.4; 
            const jitterUl = baseUl * 0.08;
            const ulSpeed = Math.max(0, baseUl + (Math.random() * jitterUl * 2) - jitterUl);
            
            const totalSpeed = dlSpeed + ulSpeed;
            
            // Ping (RTT) with slight natural jitter
            const pingJitter = baseRtt * 0.1;
            const currentPing = Math.max(1, baseRtt + (Math.random() * pingJitter * 2) - pingJitter);
            
            // Latency = Ping + simulated routing/device processing overhead
            const currentLatency = currentPing + 2 + (Math.random() * 4);

            document.getElementById('netTot').textContent = totalSpeed.toFixed(1);
            document.getElementById('netDl').textContent = dlSpeed.toFixed(1);
            document.getElementById('netUl').textContent = ulSpeed.toFixed(1);
            document.getElementById('netPing').textContent = Math.round(currentPing);
            document.getElementById('netLat').textContent = Math.round(currentLatency);
        }
        
        updateSpeedDisplay();
        if (window.speedInterval) clearInterval(window.speedInterval);
        window.speedInterval = setInterval(updateSpeedDisplay, 800); // Update rapidly for futuristic UI feel

        // --- SYSTEM GRAPH LOGIC (Simulated CPU/RAM + Actual Net) ---
        const canvas = document.getElementById('sysGraph');
        const ctx = canvas.getContext('2d');
        const historyLen = 40;
        
        const sysData = {
            net: new Array(historyLen).fill(0),
            cpu: new Array(historyLen).fill(20),
            ram: new Array(historyLen).fill(40)
        };

        let simCpu = 20;
        let simRam = 45;

        function drawGraph() {
            // 1. Update Data
            // Network (Scale based on an assumed 200mbps max for visual variance). Replaced the missing baseSpeed with baseDl.
            const currentSpeed = baseDl + (Math.random() * (baseDl * 0.1) * 2) - (baseDl * 0.1);
            sysData.net.shift();
            sysData.net.push(Math.min((currentSpeed / 200) * 100, 100));

            // CPU (Simulate load with occasional spikes)
            sysData.cpu.shift();
            simCpu += (Math.random() * 10 - 5);
            if(simCpu < 5) simCpu = 5; 
            if(simCpu > 60) simCpu -= 5; // Gravity pulling it down
            if(Math.random() > 0.97) simCpu = 70 + Math.random() * 30; // Random heavy task spike
            sysData.cpu.push(simCpu);

            // RAM (Simulate stable memory usage with slow drift)
            sysData.ram.shift();
            simRam += (Math.random() * 2 - 1);
            if(simRam < 30) simRam = 30; 
            if(simRam > 85) simRam = 85;
            sysData.ram.push(simRam);

            // 2. Draw Graph
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const drawLine = (arr, color) => {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                // Add a slight glow
                ctx.shadowBlur = 4;
                ctx.shadowColor = color;
                
                for(let i = 0; i < arr.length; i++) {
                    const x = (i / (historyLen - 1)) * canvas.width;
                    // Invert Y axis (100 is top, 0 is bottom)
                    const y = canvas.height - (arr[i] / 100) * canvas.height; 
                    
                    if(i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0; // Reset
            };

            // Draw lines in order: Background to Foreground
            drawLine(sysData.ram, 'var(--cyan)');
            drawLine(sysData.cpu, 'var(--purple)');
            drawLine(sysData.net, '#00ff66');
        }

        if (window.graphInterval) clearInterval(window.graphInterval);
        window.graphInterval = setInterval(drawGraph, 150); // Fast 150ms update interval for smooth scrolling

        // --- GEMINI AI INTEGRATION ---
        const apiKey = ""; // Implicitly provided by the environment
        const aiBtn = document.getElementById('aiBtn');
        const searchInput = document.getElementById('searchInput');
        const aiTerminal = document.getElementById('aiTerminal');
        const aiContent = document.getElementById('aiContent');
        const closeAi = document.getElementById('closeAi');

        // Close the terminal manually
        closeAi.addEventListener('click', () => {
            aiTerminal.classList.remove('active');
        });

        // Exponential backoff strategy for the API call
        async function fetchGeminiWithRetry(prompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "You are Aegis, an advanced, futuristic AI assistant embedded in a cyber-deck command terminal. Keep responses concise, informative, and maintain a cool, tactical sci-fi persona." }] 
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "NO RESPONSE DETECTED FROM NEURAL NET.";
                } catch (error) {
                    if (i === retries - 1) return `ERROR: NEURAL LINK FAILED. ${error.message}`;
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
        }

        // Typing effect for the AI output
        function typeWriter(text, element, speed = 15) {
            element.innerHTML = '';
            let i = 0;
            const cursor = '<span class="cursor"></span>';
            
            function type() {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + cursor;
                    i++;
                    setTimeout(type, speed);
                } else {
                    element.innerHTML = text + cursor;
                }
            }
            type();
        }

        // Event trigger for AI query
        aiBtn.addEventListener('click', async () => {
            const query = searchInput.value.trim();
            if (!query) return;

            // Expand terminal and render loading state
            aiTerminal.classList.add('active');
            aiContent.innerHTML = 'ESTABLISHING SECURE NEURAL LINK...<span class="cursor"></span>';
            
            // Execute prompt
            const responseText = await fetchGeminiWithRetry(query);
            
            // Output the response
            typeWriter(responseText, aiContent);
        });
    </script>
